<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description"
    content="Nikhil Pathak — Product Manager, Certified Scrum Master, and Vibe Coder. Building products at the intersection of strategy, agile, and AI." />
  <title>Nikhil Pathak — Product · Agile · AI</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Outfit:wght@300;400;500;600&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>

<body>

  <nav>
    <a href="#" class="nav-logo" id="nav-logo">Nikhil Pathak</a>
    <div class="nav-links">
      <a href="#skills">Skills</a>
      <a href="#experience">Experience</a>
      <a href="#projects">Work</a>
      <a href="#certs">Credentials</a>
      <a href="#contact" class="nav-cta">Contact</a>
    </div>
  </nav>

  <header class="hero">
    <div class="hero-grid">
      <div>
        <div class="hero-eyebrow" id="hero-eyebrow"></div>
        <h1 id="hero-tagline"></h1>
        <p class="hero-desc" id="hero-desc"></p>
        <div class="hero-actions">
          <a href="#contact" class="btn btn-dark">Get in touch →</a>
          <a href="#experience" class="btn btn-outline">View experience</a>
        </div>
      </div>
      <div class="hero-card">
        <div class="hc-label">At a glance</div>
        <div id="glance-stats"></div>
        <div class="hc-pills" id="glance-pills"></div>
      </div>
    </div>
  </header>

  <section id="skills">
    <div class="section-inner">
      <div class="section-meta reveal">
        <div class="section-num">01 — Expertise</div>
        <h2 id="skills-title"></h2>
        <p id="skills-desc"></p>
      </div>
      <div class="skills-3col reveal" id="skills-grid"></div>
    </div>
  </section>

  <section id="ai-products">
    <div class="section-inner">
      <div class="section-meta reveal">
        <div class="section-num">02 — AI Initiative</div>
        <h2 id="ai-title">AI Products<br /><em>Built & Shipped.</em></h2>
      </div>
      <div class="tl" id="ai-timeline"></div>
    </div>
  </section>

  <section id="experience">
    <div class="section-inner">
      <div class="section-meta reveal">
        <div class="section-num">03 — Background</div>
        <h2 id="exp-title"></h2>
      </div>
      <div class="tl" id="timeline"></div>
    </div>
  </section>

  <section id="projects">
    <div class="section-inner">
      <div class="section-meta reveal">
        <div class="section-num">04 — Vibe Coding</div>
        <h2 id="proj-title"></h2>
        <p id="proj-desc"></p>
      </div>
      <div class="projects-grid" id="projects-grid"></div>
    </div>
  </section>

  <section id="certs">
    <div class="section-inner">
      <div class="section-meta reveal">
        <div class="section-num">05 — Credentials</div>
        <h2 id="certs-title"></h2>
      </div>
      <div class="certs-grid reveal" id="certs-grid"></div>
    </div>
  </section>

  <div class="contact-section" id="contact">
    <div class="contact-wrap">
      <div class="section-num">06 — Contact</div>
      <h2 id="contact-heading"></h2>
      <p id="contact-desc"></p>
      <div class="contact-links">
        <a id="contact-email" href="#" class="contact-link">

            <path d="M16 8a6 6 0 016 6v7h-4v-7a2 2 0 00-2-2 2 2 0 00-2 2v7h-4v-7a6 6 0 016-6zM2 9h4v12H2z" />

          LinkedIn
        </a>
        <a id="contact-cv" href="#" class="contact-link">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M12 10v6m0 0l-3-3m3 3l3-3M3 17V7a2 2 0 012-2h6l2 2h6a2 2 0 012 2v8a2 2 0 01-2 2H5a2 2 0 01-2-2z" />
          </svg>
          Download CV

      </div>
    </div>
  </div>

  <footer>
    <p id="footer-copy"></p>
    <p id="footer-tag"></p>
  </footer>

  <script src="data.js?v=2.2"></script>
  <script src="app.js?v=2.2"></script>
</body>

</html>
